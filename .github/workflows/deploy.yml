name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: npx tailwindcss -i src/tailwind-input.css -o dist/tailwind.css
      - run: bun test --path-ignore-patterns='e2e/**'
      - run: bun run build
      - run: |
          npx playwright install chromium
          python3 -m http.server 8080 & sleep 1
          bun run e2e/e2e.test.ts
        env:
          BASE_URL: "http://localhost:8080"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
