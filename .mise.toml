[tools]
bun = "1.3.14"

[tasks.install]
run = "bun install"
description = "Install dependencies"

[tasks.build]
run = "bun build src/index.ts --outdir dist"
description = "Bundle TypeScript to dist/index.js"
depends = ["install"]

[tasks.dev]
run = "bun build src/index.ts --outdir dist --watch"
description = "Build in watch mode"
depends = ["install"]

[tasks.test]
run = "bun test"
description = "Run tests"
