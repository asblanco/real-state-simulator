[tools]
bun = "1.3.14"

[tasks.install]
run = "bun install"
description = "Install dependencies"

[tasks.build]
run = '''
  npx tailwindcss -i src/tailwind-input.css -o dist/tailwind.css
  bun build src/index.ts --outdir dist
'''
description = "Bundle TypeScript to dist/index.js"
depends = ["install"]

[tasks.dev]
run = "bun build src/index.ts --outdir dist --watch"
description = "Build in watch mode"
depends = ["install"]

[tasks.test]
run = "bun test --path-ignore-patterns='e2e/**'"
description = "Run unit tests"

[tasks.e2e]
run = "python3 -m http.server 8080 > /dev/null 2>&1 & sleep 1 && bun run e2e/e2e.test.ts; exit_code=$?; kill $(lsof -t -i:8080) 2>/dev/null; exit $exit_code"
description = "Run end-to-end tests (requires Chromium)"
depends = ["build"]
